name: xwidget
description: A package for building dynamic UIs in Flutter using an expressive, XML based markup language.
version: 0.7.0
repository: https://github.com/appfluent/xwidget
issue_tracker: https://github.com/appfluent/xwidget/issues

topics:
  - dynamic-ui
  - server-driven-ui
  - xml
  - widgets
  - analytics

platforms:
  android:
  ios:
  linux:
  macos:
  web:
  windows:

environment:
  sdk: '>=3.9.0 <4.0.0'
  flutter: ">=3.35.0"

dependencies:
  flutter:
    sdk: flutter
  archive: ^4.0.9
  crypto: ^3.0.7
  http: ^1.6.0
  logging: ^1.3.0
  path_provider: ^2.1.5
  xml: ">=6.6.1 <8.0.0"
  web: ^1.1.1
  xwidget_el: ^0.7.0

dev_dependencies:
  args: ^2.7.0
  flutter_test:
    sdk: flutter
  lints: ^6.1.0
  # Test-only: typed fake for path_provider in analytics store tests.
  path_provider_platform_interface: ^2.1.0
  plugin_platform_interface: ^2.1.0

# For information on the generic Dart part of this file, see the
# following section is specific to Flutter packages.
flutter: